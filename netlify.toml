# Netlify 配置文件
# 访问 https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# 环境变量
[build.environment]
  NODE_VERSION = "18"

# 重定向规则（处理 SPA 路由）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify Functions 配置
[functions]
  node_bundler = "esbuild"
  # 注意：免费计划每月 125,000 次调用
