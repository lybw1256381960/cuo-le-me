# Netlify 配置文件
# 访问 https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"

# 环境变量
[build.environment]
  NODE_VERSION = "24.16.0"

# API 代理到 Render 后端。必须放在 SPA fallback 前面。
[[redirects]]
  from = "/api/*"
  to = "https://cuo-le-me-api.onrender.com/api/:splat"
  status = 200
  force = true

# 重定向规则（处理 SPA 路由）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Netlify Functions 配置
[functions]
  node_bundler = "esbuild"
  # 注意：免费计划每月 125,000 次调用
